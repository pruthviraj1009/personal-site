<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>404 — Pruthviraj Desai</title>
<meta name="color-scheme" content="dark" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="stylesheet" href="/style.css" />
</head>
<body>

  <main class="wrap">

    <nav class="sitenav reveal">
      <a href="/" class="logo">Pruthviraj Desai</a>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/projects.html">Projects</a>
        <a href="/blog.html">Blog</a>
      </div>
    </nav>

    <div class="error-page reveal">
      <div class="error-code">404</div>
      <div class="error-terminal">
        <div class="terminal-line">
          <span class="terminal-prompt">$</span>
          <span class="terminal-cmd">GET <span id="error-path"></span></span>
        </div>
        <div class="terminal-line error-output">bash: page not found</div>
        <div class="terminal-line">
          <span class="terminal-prompt">$</span>
          <span class="terminal-cursor" aria-hidden="true"></span>
        </div>
      </div>
      <p class="error-msg">This page doesn't exist — it may have moved or never existed.</p>
      <div class="links" style="margin-top: 28px;">
        <a href="/">Home</a>
        <a href="/projects.html">Projects</a>
        <a href="/blog.html">Blog</a>
      </div>
    </div>

    <footer class="reveal">
      Served from my own server with <span class="accent">Caddy</span> and automatic HTTPS.<br>
      No trackers, no third parties, no cookies.
    </footer>

  </main>

  <style>
    .error-page { margin-top: 60px; }
    .error-code {
      font-family: var(--display);
      font-size: clamp(80px, 20vw, 140px);
      font-weight: 600;
      line-height: 1;
      letter-spacing: -.03em;
      color: var(--surface-2);
      margin-bottom: 32px;
      user-select: none;
    }
    .error-terminal {
      font-family: var(--mono);
      font-size: 13.5px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 24px;
      display: inline-block;
      min-width: 340px;
    }
    .terminal-line { display: flex; align-items: center; gap: 10px; line-height: 2; }
    .terminal-prompt { color: var(--signal); }
    .terminal-cmd { color: var(--ink-soft); }
    .terminal-cmd span { color: var(--ink-faint); }
    .error-output { color: #f87171; padding-left: 22px; }
    .terminal-cursor {
      display: inline-block;
      width: 8px; height: 1.1em;
      background: var(--signal);
      border-radius: 1px;
      animation: blink 1.1s step-end infinite;
      vertical-align: middle;
    }
    .error-msg { color: var(--ink-soft); font-size: 16px; margin: 0; }
  </style>

  <script>
    var io = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) {
        if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(function(el) { io.observe(el); });

    var path = window.location.pathname;
    document.getElementById('error-path').textContent = path;
  </script>
</body>
</html>
